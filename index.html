<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트래블월렛 · 국내에서 더 편하게 쓰기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --blue:#0baeff;
    --dark:#333;
    --ink:#212121;
    --grey:#f0f0f0;
    --skyfill:#c5eefe;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#e9eef1;
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Segoe UI',sans-serif;
    display:flex;justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  /* Korean-display fallback for the Kakao brand fonts */
  .kakao{font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;}

  .page{
    width:375px;background:#fff;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding-bottom:50px;overflow:hidden;
  }

  /* ---------- header ---------- */
  header{
    width:100%;
    background:linear-gradient(to bottom,#91daff 0%,#ffffff 100%);
    display:flex;flex-direction:column;align-items:center;
    gap:27px;padding:50px 0 30px;
    overflow:hidden;
  }
  .title-block{
    width:256px;display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .subtitle{
    color:#555;font-size:20px;text-align:center;letter-spacing:-1.4px;
    line-height:26px;font-weight:700;
  }
  .headline{
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .headline .pay{height:35px;width:auto;display:block;}
  .headline .txt{
    font-size:37px;font-weight:800;color:#000;line-height:36px;letter-spacing:-1px;
  }

  .iphone-scene{
    position:relative;width:790px;height:370px;margin:0 auto;flex:none;
  }
  .iphone-scene>*{position:absolute;}
  .logo-faint{
    left:159px;top:68px;width:542px;height:142px;
    opacity:.15;object-fit:cover;pointer-events:none;
  }
  .shadow{
    left:245px;top:0;width:234.565px;height:353.297px;
    mix-blend-mode:multiply;object-fit:fill;pointer-events:none;
  }
  .iphone{
    left:300.626px;top:12.621px;width:150.705px;height:312.255px;
    object-fit:fill;pointer-events:none;
  }
  .screen{
    left:306.414px;top:17.429px;width:139.119px;height:302.259px;
    border-radius:18px;object-fit:fill;pointer-events:none;
  }
  .card{
    left:515.578px;top:133.409px;width:138.578px;height:193.545px;
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .card .inner{
    transform:rotate(98.28deg);
    width:179px;height:114px;border-radius:8px;
    border:.5px solid #f0f0f0;
    box-shadow:-5px 15px 17px 0 rgba(0,0,0,.3);
    overflow:hidden;
  }
  .card .inner img{width:100%;height:100%;object-fit:cover;display:block;}

  /* ---------- contents ---------- */
  .contents{
    width:312px;display:flex;flex-direction:column;align-items:center;
  }
  .section{
    width:100%;display:flex;flex-direction:column;align-items:center;
    gap:36px;padding:40px 0;
  }
  .step-head{
    width:100%;display:flex;flex-direction:column;align-items:center;gap:18px;
  }
  .badge{
    background:var(--dark);color:#fff;font-size:16px;font-weight:600;
    letter-spacing:-.32px;padding:6px 14px;border-radius:50px;white-space:nowrap;
  }
  .lead{
    font-size:20px;text-align:center;color:var(--ink);letter-spacing:-1px;
    line-height:1.3;font-weight:400;
  }
  .lead b{color:var(--blue);font-weight:700;}

  .imgbox{
    width:312px;height:220px;border-radius:20px;background:var(--grey);
    position:relative;overflow:hidden;
  }
  .imgbox .fill{width:100%;height:100%;object-fit:cover;display:block;}

  .btn{
    width:100%;border-radius:50px;display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:500;padding:16px;cursor:pointer;border:none;
    text-decoration:none;
  }
  .btn-dark{background:var(--dark);color:#fff;}
  .btn-white{background:#fff;color:var(--blue);}

  .stack{width:100%;display:flex;flex-direction:column;align-items:center;gap:20px;position:relative;}

  /* step2 store illustration (CSS reconstruction) */
  .store-scene{position:absolute;inset:0;}
  .store{
    position:absolute;left:34px;top:70px;width:156px;height:120px;
  }
  .store .roof{
    position:absolute;top:0;left:0;width:156px;height:36px;background:#43484b;border-radius:8px;
  }
  .store .body{
    position:absolute;top:44px;left:6px;width:144px;height:74px;background:#b2dff0;border-radius:8px;
  }
  .store .door{
    position:absolute;bottom:0;left:44px;width:60px;height:74px;background:#fff;
    border:4px solid #43484b;border-radius:15px 15px 0 0;
  }
  .store .flag{
    position:absolute;top:-6px;left:118px;width:16px;height:16px;background:#ffeb00;
    border:1px solid #ffc33a;border-radius:2px;
  }
  .bubble{
    position:absolute;right:18px;top:26px;width:124px;height:124px;background:#ffeb00;
    border:2px solid #f3d126;border-radius:15px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  }
  .bubble .b1{font-size:21px;font-weight:800;color:#000;line-height:27px;}
  .bubble .b2{font-size:21px;font-weight:400;color:#000;line-height:27px;}
  .bubble .paylogo{height:20px;width:auto;}
  .plus{
    position:absolute;left:138px;top:212px;width:36px;height:36px;z-index:5;
  }

  /* promo card */
  .promo{
    width:100%;background:var(--skyfill);border-radius:20px;
    display:flex;flex-direction:column;align-items:center;gap:20px;
    padding:30px 20px;
  }
  .promo .ttl{
    font-size:22px;font-weight:700;color:var(--ink);text-align:center;
    letter-spacing:-1.1px;line-height:30px;
  }
  .promo .ttl b{color:var(--blue);font-weight:700;}
  .coins{position:relative;width:150px;height:82px;}
  .coins .bag{position:absolute;left:28px;top:1.6px;width:80px;height:80px;object-fit:contain;}
  .coins .s1{position:absolute;left:93px;top:0;width:30px;height:30px;transform:rotate(13.39deg);}
  .coins .s2{position:absolute;left:0;top:13px;width:30px;height:30px;transform:rotate(-15.9deg);}
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header>
    <div class="title-block">
      <div class="subtitle kakao">트래블월렛<br>국내에서 더 편하게 쓰기</div>
      <div class="headline">
        <img class="pay" src="http://localhost:3845/assets/8499c7588b9823c92aa9f71238b5e53ac19bef12.svg" alt="pay">
        <span class="txt kakao">할게요!</span>
      </div>
    </div>

    <div class="iphone-scene">
      <img class="logo-faint" src="http://localhost:3845/assets/ec2df6ac1acabe0fdd995e050bffc74b7485a382.png" alt="">
      <img class="shadow" src="http://localhost:3845/assets/acb219c1cc5d07ec1997ec8d66569f47dc881099.png" alt="">
      <img class="iphone" src="http://localhost:3845/assets/8893417f2eeeb496e724dd2d03db355c0c432fbb.png" alt="">
      <img class="screen" src="http://localhost:3845/assets/d267cdb60357f4c300508871e122bfb184b01b5d.png" alt="">
      <div class="card"><div class="inner">
        <img src="http://localhost:3845/assets/6ac6719cf9e65fb2f33e4aec27f0429cd5ffd3d5.png" alt="트래블월렛 카드">
      </div></div>
    </div>
  </header>

  <!-- CONTENTS -->
  <div class="contents">

    <!-- STEP 1 -->
    <section class="section">
      <div class="step-head">
        <div class="badge">1 단계</div>
        <div class="lead kakao">
          카카오페이 앱에서 <b>트래블월렛 실물카드</b><br>
          혹은 <b>모바일카드</b>를 <b>등록</b>해 주세요.
        </div>
      </div>
      <div class="imgbox">
        <img class="fill" src="http://localhost:3845/assets/46bfc745bbad4b5262c236ae67a0b6535189fd97.png" alt="카드 등록 화면">
      </div>
      <a class="btn btn-dark" href="#">내 카드번호 확인하기</a>
    </section>

    <!-- STEP 2 -->
    <section class="section">
      <div class="step-head">
        <div class="badge">2 단계</div>
        <div class="lead kakao">
          <b>전국 카카오페이 가맹점</b>에서<br>
          <b>결제</b>할 수 있어요.
        </div>
      </div>

      <div class="stack">
        <!-- store illustration -->
        <div class="imgbox">
          <div class="store-scene">
            <div class="store">
              <div class="roof"></div>
              <div class="body"></div>
              <div class="door"></div>
              <div class="flag"></div>
            </div>
            <div class="bubble">
              <div class="b1 kakao">카카오페이</div>
              <div class="b2 kakao">됩니다.</div>
              <img class="paylogo" src="http://localhost:3845/assets/671b44d1375384f2efb269f04b2781ccd0ccb958.svg" alt="pay">
            </div>
          </div>
        </div>

        <!-- plus connector -->
        <img class="plus" src="http://localhost:3845/assets/ffffd3f48030937aeec5122fcc906326db961d7b.svg" alt="+">

        <!-- promo card -->
        <div class="promo">
          <div class="ttl kakao">결제할 때마다<br><b>0.5% 적립</b>받고 싶다면?</div>
          <div class="coins">
            <img class="bag" src="http://localhost:3845/assets/fa13e4a3bdfae651ec86f64eaf91384c20a511b8.png" alt="적립">
            <img class="s1" src="http://localhost:3845/assets/dce330f751f77760a925f6a1a6d5cc8d3837debc.svg" alt="">
            <img class="s2" src="http://localhost:3845/assets/6d07733ff5e954616f3301c82f5a52293c5f39ca.svg" alt="">
          </div>
          <a class="btn btn-white" href="#">적립 신청 바로가기</a>
        </div>
      </div>
    </section>

  </div>
</div>
</body>
</html>
